<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>INDIEMANIA</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="cabinet">
        <div class="screen-frame">
          <canvas id="game" width="960" height="640" aria-label="Rumble64 playable wrestling match"></canvas>
        </div>
        <div class="controls">
          <span>Move: Arrow Keys</span>
          <span>Punch: Z</span>
          <span>Kick: V</span>
          <span>Grapple: X</span>
          <span>Run: C</span>
          <span>Pin: A</span>
          <span>Finisher: S</span>
          <span>Block/Kickout: Shift / Space</span>
        </div>
      </section>
    </main>
    <script src="src/main.js?v=phil-stamper-1"></script>
  </body>
</html>
