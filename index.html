<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Rumble64</title>
    <link rel="stylesheet" href="styles.css?v=whip-run-speed-1">
  </head>
  <body>
    <main class="shell">
      <section class="cabinet">
        <div class="screen-frame">
          <canvas id="game" width="960" height="640" aria-label="Rumble64 playable wrestling match"></canvas>
          <div class="mobile-controls" aria-label="Touch controls">
            <div class="mobile-pad" aria-label="Movement pad">
              <button class="touch-control pad up" data-key="ArrowUp" aria-label="Move up"></button>
              <button class="touch-control pad left" data-key="ArrowLeft" aria-label="Move left"></button>
              <button class="touch-control pad right" data-key="ArrowRight" aria-label="Move right"></button>
              <button class="touch-control pad down" data-key="ArrowDown" aria-label="Move down"></button>
            </div>
            <div class="mobile-actions" aria-label="Action buttons">
              <button class="touch-control action primary fight-control punch" data-key="z">P</button>
              <button class="touch-control action primary fight-control kick" data-key="x">K</button>
              <button class="touch-control action fight-control grapple" data-key="v">G</button>
              <button class="touch-control action fight-control finisher" data-key="s">F</button>
              <button class="touch-control action small fight-control pin" data-key="a">PIN</button>
              <button class="touch-control action small fight-control run" data-key="c">RUN</button>
              <button class="touch-control action small fight-control block" data-key="Shift">BLK</button>
              <button class="touch-control action small fight-control out" data-key=" ">OUT</button>
              <button class="touch-control start menu-control" data-key="Enter">START</button>
              <button class="touch-control fullscreen menu-control" type="button" aria-label="Fullscreen">FULL</button>
            </div>
          </div>
        </div>
        <div class="controls">
          <span>Move: Arrow Keys</span>
          <span>Punch: Z</span>
          <span>Kick: X</span>
          <span>Grapple: V</span>
          <span>Run / Whip: C</span>
          <span>Grapple Moves: Z / X / V / S</span>
          <span>Pin: A</span>
          <span>Finisher: S</span>
          <span>Block/Kickout: Shift / Space</span>
        </div>
      </section>
    </main>
    <script src="src/main.js?v=keyboard-actions-1"></script>
  </body>
</html>
